<ion-header>
  <ion-toolbar>
    <ion-searchbar
      #searchbar
      debounce="800"
      show-clear-button="focus"
      (ionInput)="onSearchedChange($event)"
    ></ion-searchbar>
  </ion-toolbar>
</ion-header>
<ion-content>
  <app-restaurant-list
    [loading]="loading"
    [results]="results"
  ></app-restaurant-list>
</ion-content>
